name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual triggers

jobs:
  test:
    uses: ./.github/workflows/test.yml
    secrets: inherit

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/mambo
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{branch}}-{{date 'YYYYMMDD-HHmmss'}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/mambo:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/mambo:buildcache,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to CasaOS
        uses: appleboy/ssh-action@v1.0.0
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        with:
          host: ${{ secrets.CASAOS_HOST }}
          username: ${{ secrets.CASAOS_USERNAME }}
          key: ${{ secrets.CASAOS_SSH_KEY }}
          port: ${{ secrets.CASAOS_SSH_PORT || 22 }}
          envs: DOCKER_USERNAME,DISCORD_TOKEN
          script: |
            # Navigate to deployment directory
            cd /DATA/AppData/mambo || mkdir -p /DATA/AppData/mambo
            cd /DATA/AppData/mambo

            # Backup current container name for rollback
            CURRENT_CONTAINER=$(docker ps --filter "name=mambo" --format "{{.Names}}" | head -1)
            echo "Current container: $CURRENT_CONTAINER"

            # Save current image tag for rollback
            if [ ! -z "$CURRENT_CONTAINER" ]; then
              CURRENT_IMAGE=$(docker inspect --format='{{.Config.Image}}' $CURRENT_CONTAINER)
              echo "$CURRENT_IMAGE" > .last_successful_image
              echo "Saved rollback image: $CURRENT_IMAGE"
            fi

            # Pull new image
            docker pull $DOCKER_USERNAME/mambo:latest

            # Stop and rename old container (keep it for rollback)
            if [ ! -z "$CURRENT_CONTAINER" ]; then
              docker stop $CURRENT_CONTAINER
              docker rename $CURRENT_CONTAINER mambo-backup-$(date +%s)
            fi

            # Start new container
            docker run -d \
              --name mambo \
              --restart unless-stopped \
              -e DISCORD_TOKEN="$DISCORD_TOKEN" \
              -v /DATA/AppData/mambo/logs:/app/logs \
              $DOCKER_USERNAME/mambo:latest

            echo "New container started, waiting for health check..."

      - name: Wait for deployment to stabilize
        run: sleep 30

      - name: Run deployment tests
        uses: appleboy/ssh-action@v1.0.0
        id: deployment_test
        continue-on-error: true
        with:
          host: ${{ secrets.CASAOS_HOST }}
          username: ${{ secrets.CASAOS_USERNAME }}
          key: ${{ secrets.CASAOS_SSH_KEY }}
          port: ${{ secrets.CASAOS_SSH_PORT || 22 }}
          script: |
            # Check if container is running
            if ! docker ps --filter "name=mambo" --filter "status=running" | grep -q mambo; then
              echo "ERROR: Container is not running"
              exit 1
            fi

            # Check container logs for errors
            if docker logs mambo 2>&1 | grep -i "error\|exception\|failed" | grep -v "test"; then
              echo "ERROR: Found errors in container logs"
              exit 1
            fi

            # Check if bot logged in successfully
            if ! docker logs mambo 2>&1 | grep -q "Logged in as"; then
              echo "ERROR: Bot did not log in successfully"
              exit 1
            fi

            echo "All deployment tests passed!"

      - name: Rollback on failure
        if: steps.deployment_test.outcome == 'failure'
        uses: appleboy/ssh-action@v1.0.0
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        with:
          host: ${{ secrets.CASAOS_HOST }}
          username: ${{ secrets.CASAOS_USERNAME }}
          key: ${{ secrets.CASAOS_SSH_KEY }}
          port: ${{ secrets.CASAOS_SSH_PORT || 22 }}
          envs: DOCKER_USERNAME,DISCORD_TOKEN
          script: |
            cd /DATA/AppData/mambo

            echo "Deployment tests failed, rolling back..."

            # Stop failed container
            docker stop mambo || true
            docker rm mambo || true

            # Find and restore backup container
            BACKUP_CONTAINER=$(docker ps -a --filter "name=mambo-backup" --format "{{.Names}}" | sort -r | head -1)

            if [ ! -z "$BACKUP_CONTAINER" ]; then
              echo "Restoring backup container: $BACKUP_CONTAINER"
              docker start $BACKUP_CONTAINER
              docker rename $BACKUP_CONTAINER mambo
              echo "Rollback completed successfully"
            elif [ -f .last_successful_image ]; then
              echo "Restoring from last successful image"
              LAST_IMAGE=$(cat .last_successful_image)
              docker run -d \
                --name mambo \
                --restart unless-stopped \
                -e DISCORD_TOKEN="$DISCORD_TOKEN" \
                -v /DATA/AppData/mambo/logs:/app/logs \
                $LAST_IMAGE
              echo "Rollback to last image completed"
            else
              echo "ERROR: No backup available for rollback!"
              exit 1
            fi

      - name: Cleanup old backup containers
        if: steps.deployment_test.outcome == 'success'
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.CASAOS_HOST }}
          username: ${{ secrets.CASAOS_USERNAME }}
          key: ${{ secrets.CASAOS_SSH_KEY }}
          port: ${{ secrets.CASAOS_SSH_PORT || 22 }}
          script: |
            # Remove old backup containers (keep only last 2)
            docker ps -a --filter "name=mambo-backup" --format "{{.Names}}" | sort -r | tail -n +3 | xargs -r docker rm -f

            # Remove old images (keep only last 3)
            docker images ${{ secrets.DOCKER_USERNAME }}/mambo --format "{{.ID}}" | tail -n +4 | xargs -r docker rmi -f || true

            echo "Cleanup completed"

      - name: Fail workflow if tests failed
        if: steps.deployment_test.outcome == 'failure'
        run: |
          echo "Deployment tests failed and rollback was triggered"
          exit 1

      - name: Deployment success notification
        if: steps.deployment_test.outcome == 'success'
        run: |
          echo "✅ Deployment successful and verified!"
          echo "Container is running and passed all health checks"